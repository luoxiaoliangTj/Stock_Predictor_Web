<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Predictor</title>
<style>
:root{--bg:#fff;--card:#f8f9fa;--border:#e0e0e0;--text:#212121;--sub:#757575;--accent:#1976d2;--up:#d32f2f;--down:#388e3c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);max-width:780px;margin:0 auto;padding:1rem}
.search-box{display:flex;gap:.5rem;margin:2rem 0 1rem}
.search-input{flex:1;padding:.85rem 1.2rem;border:2px solid var(--border);border-radius:10px;font-size:1.05rem;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-btn{padding:.85rem 1.8rem;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer;font-weight:500}
.search-btn:hover{opacity:.92}
.search-btn:disabled{opacity:.5;cursor:not-allowed}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin:1rem 0 1.2rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem .5rem;text-align:center}
.stat-label{font-size:.68rem;color:var(--sub);margin-bottom:.15rem}
.stat-value{font-size:1.08rem;font-weight:700}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.2rem;margin:1rem 0}
.header-row{display:flex;justify-content:space-between;align-items:baseline}
.stock-name{font-size:1rem;color:var(--sub)}
.stock-code{font-size:.8rem;color:var(--sub)}
.price-main{font-size:3rem;font-weight:800;line-height:1.1;margin:.3rem 0}
.change-row{display:flex;gap:1.2rem;font-size:1.05rem;font-weight:600}
.change-up{color:var(--up)}
.change-down{color:var(--down)}
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.2rem;margin:.8rem 0}
.section-title{font-size:.82rem;color:var(--sub);margin-bottom:.5rem;font-weight:600}
.section-content{font-size:.88rem;line-height:1.65}
.section-content table{width:100%;border-collapse:collapse}
.section-content td{padding:.32rem .5rem;border-bottom:1px solid var(--border);font-size:.84rem}
.section-content td:first-child{color:var(--sub);width:32%}
.section-content td:nth-child(3){color:var(--sub);width:32%}
.ann-item{padding:.6rem 0;border-bottom:1px solid var(--border);cursor:pointer}
.ann-item:last-child{border-bottom:none}
.ann-item:hover .ann-title{color:var(--accent)}
.ann-title{font-size:.88rem;line-height:1.45;transition:color:.15s}
.ann-meta{display:flex;gap:.8rem;margin-top:.2rem}
.ann-type{font-size:.7rem;padding:.08rem .45rem;border-radius:4px;background:rgba(25,118,210,.1);color:var(--accent)}
.ann-date{font-size:.72rem;color:var(--sub)}
.loading{text-align:center;padding:2.5rem;color:var(--sub)}
.error{text-align:center;padding:1.5rem;color:var(--up);font-size:.9rem}
.timestamp{text-align:center;font-size:.72rem;color:var(--sub);margin:.8rem 0 1.5rem}
</style>
</head>
<body>
<div class="search-box">
  <input type="text" class="search-input" id="searchInput" placeholder="例如: 600036 / 招商银行 / ZS" autocomplete="off" autofocus>
  <button class="search-btn" id="searchBtn" onclick="searchStock()">查询</button>
</div>
<div id="results"></div>
<script>
const NAME_MAP={'贵州茅台':'600519','中国平安':'601318','工商银行':'601398','中国银行':'601988','农业银行':'601288','招商银行':'600036','中国石油':'601857','中国石化':'600028','中国建筑':'601668','中国移动':'600941','中国电信':'601728','中国联通':'600050','长江电力':'600900','紫金矿业':'601899','比亚迪':'002594','宁德时代':'300750','五粮液':'000858','美的集团':'000333','海尔智家':'600690','格力电器':'000651','恒瑞医药':'600276','药明康德':'603259','迈瑞医疗':'300760','中信证券':'600030','东方财富':'300059','华泰证券':'601688','保利发展':'600048','万科A':'000002','金地集团':'600383','荣盛发展':'002146','新城控股':'601155','海螺水泥':'600585','三一重工':'600031','隆基绿能':'601012','通威股份':'600438','阳光电源':'300274','京东方A':'000725','海康威视':'002415','立讯精密':'002475','汇川技术':'300124','爱尔眼科':'300015','智飞生物':'300122','中远海控':'601919','中国中免':'601888','中国神华':'601088','陕西煤业':'601225','万华化学':'600309','华能水电':'600025','东方电气':'600875','龙湖集团':'00960','中信银行':'601998','浦发银行':'600000','兴业银行':'601166','民生银行':'600016','光大银行':'601818','华夏银行':'600015','平安银行':'000001','宁波银行':'002142'};
const PINYIN_MAP={'GZMT':'600519','ZGPA':'601318','GS':'601398','ZG':'601988','NY':'601288','ZS':'600036','ZGSY':'601857','ZGSH':'600028','ZJGF':'600048','WK':'000002','BD':'002594','ND':'300750','WLY':'000858','MD':'000333','HE':'600690','GL':'000651','HRYY':'600276','YKD':'603259','MRYL':'300760','ZXZQ':'600030','DF':'300059','RS':'002146','XC':'601155','HD':'600585','SY':'600031','LJ':'601012','TWGF':'600438','YG':'300274','JDF':'000725','HK':'002415','LXJM':'002475','HCJS':'300124','AE':'300015','ZF':'300122','ZY':'601919','ZGZK':'601888','ZGSN':'601088','SX':'601225','WH':'600309','WHKS':'600050','CJDL':'600900','ZJKY':'601899','LNG':'600025'};
function resolveCode(input){input=input.trim();if(/^\d{5,6}$/.test(input))return normalizeCode(input);if(/^[hs][a-z]?(\d{6})$/i.test(input))return normalizeCode(input.replace(/^[hs]/i,''));if(NAME_MAP[input])return normalizeCode(NAME_MAP[input]);const u=input.toUpperCase();if(PINYIN_MAP[u])return normalizeCode(PINYIN_MAP[u]);for(const n in NAME_MAP)if(n.includes(input))return normalizeCode(NAME_MAP[n]);return null}
function normalizeCode(c){return(c.startsWith('6')||c.startsWith('9'))?'sh'+c:'sz'+c}
function p(n){return String(n).padStart(2,'0')}

async function fetchGBK(url){const r=await fetch(url);const buf=await r.arrayBuffer();return new TextDecoder('gb18030').decode(buf)}

async function searchStock(){
  const input=document.getElementById('searchInput').value.trim();if(!input)return;
  const code=resolveCode(input);const btn=document.getElementById('searchBtn');const res=document.getElementById('results');
  if(!code){res.innerHTML='<p style="text-align:center;color:var(--up);padding:2rem">未找到该股票</p>';return}
  btn.disabled=true;res.innerHTML='<div class="loading">获取实时行情...</div>';
  try{
    const raw=await fetchGBK('https://qt.gtimg.cn/q='+code);
    const m=raw.match(/v_(\w+)="(.+?)"/);
    if(!m||!m[2])throw 0;
    const f=m[2].split('~');if(f.length<48)throw 0;
    const name=f[1],sc=f[2],price=+f[3],prev=+f[4],open=+f[5],vol=+f[6],chg=+f[31],pct=+f[32],hi=+f[33],lo=+f[34],amt=+f[37],turn=f[38],pe=f[39],amp=f[43],circ=f[44],total=f[45],pb=f[46];
    const up=chg>=0;const c=up?'change-up':'change-down';const ar=up?'▲':'▼';const sg=up?'+':'';
    const now=new Date();const ts=now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate())+' '+p(now.getHours())+':'+p(now.getMinutes())+':'+p(now.getSeconds());
    res.innerHTML=`<div class="stats"><div class="stat"><div class="stat-label">现价</div><div class="stat-value">${price.toFixed(2)}</div></div><div class="stat"><div class="stat-label">涨跌</div><div class="stat-value ${c}">${sg}${chg.toFixed(2)}</div></div><div class="stat"><div class="stat-label">幅度</div><div class="stat-value ${c}">${sg}${pct.toFixed(2)}%</div></div><div class="stat"><div class="stat-label">开盘</div><div class="stat-value">${open.toFixed(2)}</div></div><div class="stat"><div class="stat-label">最高</div><div class="stat-value">${hi.toFixed(2)}</div></div><div class="stat"><div class="stat-label">最低</div><div class="stat-value">${lo.toFixed(2)}</div></div></div><div class="price-card"><div class="header-row"><span class="stock-name">${name}</span><span class="stock-code">${sc}</span></div><div class="price-main ${c}">${price.toFixed(2)}</div><div class="change-row"><span class="${c}">${ar} ${sg}${chg.toFixed(2)}</span><span class="${c}">${sg}${pct.toFixed(2)}%</span></div></div><div class="section"><div class="section-title">实时数据</div><div class="section-content"><table><tr><td>成交量</td><td>${(vol/10000).toFixed(2)}万手</td><td>成交额</td><td>${(amt/10000).toFixed(2)}亿</td></tr><tr><td>换手率</td><td>${turn}%</td><td>市盈率</td><td>${pe||'-'}</td></tr><tr><td>市净率</td><td>${pb||'-'}</td><td>振幅</td><td>${amp}%</td></tr><tr><td>流通市值</td><td>${(circ/10000).toFixed(2)}亿</td><td>总市值</td><td>${(total/10000).toFixed(2)}亿</td></tr></table></div></div><div class="section"><div class="section-title">AI 研判</div><div class="section-content">${genAnalysis(price,open,hi,lo,pct,turn,pe)}</div></div><div class="timestamp">更新于 ${ts} - 数据来源: 腾讯行情</div><div class="loading" id="annBox">加载公告...</div>`;
    fetchAnn(sc);
  }catch(e){res.innerHTML='<p style="text-align:center;color:var(--up);padding:1.5rem">行情数据异常或该代码不存在</p>'}finally{btn.disabled=false}
}

async function fetchAnn(code){
  const url='https://np-anotice-stock.eastmoney.com/api/security/ann?sr=-1&page_size=5&page_index=1&ann_type=A&stock_list='+code+'&f_node=0&s_node=0';
  try{
    const r=await fetch(url);const d=await r.json();const list=d.data?.list||[];
    const box=document.getElementById('annBox');if(!box)return;
    if(!list.length){box.outerHTML='<div class="section"><div class="section-title">最新公告</div><div class="section-content">暂无公告</div></div>';return}
    let h='<div class="section"><div class="section-title">最新公告 ('+list.length+'条)</div><div class="section-content">';
    list.forEach(a=>{const ty=(a.columns||[]).map(c=>c.column_name).join('、');const dt=(a.display_time||'').slice(0,10);h+='<div class="ann-item" onclick="window.open(\'https://data.eastmoney.com/notices/detail/'+code+'/'+a.art_code+'.html\',\'_blank\')"><div class="ann-title">'+a.title+'</div><div class="ann-meta"><span class="ann-type">'+ty+'</span><span class="ann-date">'+dt+'</span></div></div>'});
    h+='</div></div>';box.outerHTML=h;
  }catch(e){const box=document.getElementById('annBox');if(box)box.outerHTML=''}
}

function genAnalysis(price,open,hi,lo,pct,turn,pe){
  const L=[];
  if(pct>8)L.push('大幅上涨：涨幅超8%，注意涨停板抛压，追高需谨慎');else if(pct>3)L.push('明显上涨：多头占优，动能充足');else if(pct>0)L.push('小幅上涨：温和偏多，关注量能配合');else if(pct>-3)L.push('小幅调整：空头略占优，不宜盲目杀跌');else if(pct>-8)L.push('明显下跌：抛压较大，观望为主');else L.push('大幅下跌：跌幅超8%，利空风险释放中');
  if(turn>15)L.push('换手极高，主力异动，趋势面临转折');else if(turn>7)L.push('换手活跃，资金参与度高，趋势有望延续');
  return L.map(l=>'<p style="margin-bottom:.5rem">'+l+'</p>').join('');
}

document.getElementById('searchInput').addEventListener('keypress',function(e){if(e.key==='Enter')searchStock()});
</script>
</body>
</html>
